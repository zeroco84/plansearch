events {
    worker_connections 1024;
}

http {
    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # Frontend
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Increase timeout for long-running operations
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
        }

        # SSE stream (disable buffering for live updates)
        location /api/admin/stream {
            proxy_pass http://backend/api/admin/stream;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            chunked_transfer_encoding off;
        }

        # Health check
        location /health {
            proxy_pass http://backend/api/health;
        }
    }

    # Production HTTPS config (uncomment when SSL is configured)
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.ie;
    #
    #     ssl_certificate /etc/letsencrypt/live/yourdomain.ie/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.ie/privkey.pem;
    #
    #     # ... same location blocks as above ...
    # }
}
